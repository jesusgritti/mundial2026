<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Mundial 2026 - Con K Mex</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080b10;--sf:#0f1520;--sf2:#161e30;--bd:#1e2840;
  --ac:#f5c518;--ac2:#e05c2a;--tx:#dde2f0;--mu:#5a6380;
  --gn:#27ae60;--rd:#c0392b;--go:#ffd700;--si:#aaa;--br:#cd7f32;
  --r1:#f5c518;--r2:#3b82f6;--r3:#27ae60;--r4:#e05c2a;
  --ra:12px;
}
html,body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;min-height:100vh;margin:0;padding:0}
#root{min-height:100vh}
.W{max-width:920px;margin:0 auto;padding:16px}
.notif{position:fixed;top:16px;right:16px;z-index:9999;background:var(--sf2);border:1px solid var(--ac);color:var(--tx);padding:12px 20px;border-radius:var(--ra);font-size:14px;box-shadow:0 4px 24px rgba(0,0,0,.5);max-width:300px}
.notif.err{border-color:var(--rd)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
.shake{animation:shake .4s ease}
/* LOGO TEXT */
.logo-text{display:inline-flex;align-items:center;gap:4px;font-family:'Bebas Neue',sans-serif;letter-spacing:2px}
.logo-con{color:#1a2a5e;font-size:inherit}
.logo-k{color:#c0392b;font-size:inherit}
.logo-mex{color:#1a2a5e;font-size:inherit}
.logo-sub{font-size:.45em;color:#888;font-family:'DM Sans',sans-serif;letter-spacing:.5px;margin-left:4px;font-weight:400}
/* LOGIN */
.lpage{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.lcard{background:var(--sf);border:1px solid var(--bd);border-radius:20px;padding:36px 32px;width:100%;max-width:400px;text-align:center}
.ltitle{font-family:'Bebas Neue',sans-serif;font-size:clamp(44px,10vw,68px);line-height:.9;letter-spacing:2px;margin:12px 0 4px}
.ltitle span{color:var(--ac)}
.lsub{color:var(--mu);font-size:13px;margin-bottom:22px}
.ltabs{display:flex;gap:4px;margin-bottom:18px}
.ltab{flex:1;padding:10px;background:var(--sf2);border:1px solid var(--bd);color:var(--mu);border-radius:8px;cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;transition:all .2s}
.ltab.on{background:var(--ac);color:#000;border-color:var(--ac);font-weight:600}
.llabel{display:block;font-size:11px;font-weight:600;color:var(--mu);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;text-align:left}
.lfield{position:relative;margin-bottom:12px}
.linput{width:100%;background:var(--sf2);border:1px solid var(--bd);color:var(--tx);padding:13px 44px 13px 16px;border-radius:10px;font-size:15px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s;letter-spacing:2px}
.linput:focus{border-color:var(--ac)}
.leye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--mu);cursor:pointer;font-size:18px;padding:2px}
.lmsg{font-size:13px;margin:6px 0 10px;min-height:18px}
.lmsg.err{color:var(--rd)}.lmsg.ok{color:var(--gn)}
.lbtn{width:100%;padding:14px;background:var(--ac);color:#000;border:none;border-radius:10px;font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;cursor:pointer;transition:all .2s}
.lbtn:hover{background:#ffd740;transform:translateY(-1px)}
/* MODAL */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:9998;padding:16px}
.mbox{background:var(--sf);border:1px solid var(--bd);border-radius:16px;padding:28px;width:100%;max-width:380px}
.mbox h3{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;margin-bottom:18px}
.mrow{display:flex;gap:10px;margin-top:14px}
/* BUTTONS */
.btn{display:block;width:100%;padding:15px;background:var(--ac);color:#000;border:none;border-radius:var(--ra);font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;cursor:pointer;transition:all .2s}
.btn:hover{background:#ffd740;transform:translateY(-1px)}
.btn.sm{font-size:15px;padding:11px;letter-spacing:1px}
.btn.ol{background:transparent;color:var(--ac);border:1px solid var(--ac)}
.btn.ol:hover{background:rgba(245,197,24,.1)}
.btn.gh{background:transparent;color:var(--mu);border:1px solid var(--bd);font-size:14px;padding:12px;font-family:'DM Sans',sans-serif;letter-spacing:0}
.btn.gh:hover{border-color:var(--ac);color:var(--tx)}
.btn.dg{background:transparent;color:var(--rd);border:1px solid var(--rd);font-size:14px;padding:12px;font-family:'DM Sans',sans-serif;letter-spacing:0}
.btn.dg:hover{background:rgba(192,57,43,.15)}
.back{background:none;border:none;color:var(--mu);cursor:pointer;font-size:14px;padding:8px 0;margin-bottom:6px;font-family:'DM Sans',sans-serif}
.back:hover{color:var(--ac)}
.lnk{background:none;border:none;color:var(--ac);cursor:pointer;font-size:inherit;text-decoration:underline;font-family:'DM Sans',sans-serif}
/* HOME */
.hero{text-align:center;padding:32px 0 22px}
.hero-logo-wrap{margin-bottom:14px}
.htitle{font-family:'Bebas Neue',sans-serif;font-size:clamp(56px,12vw,100px);line-height:.88;letter-spacing:2px}
.htitle span{color:var(--ac)}
.hsub{margin-top:10px;color:var(--mu);font-size:13px;letter-spacing:.5px}
.hbtns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:18px}
.sec{margin-top:30px}
.stitle{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;margin-bottom:12px;color:var(--mu)}
.vtitle{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:2px;margin-bottom:14px}
/* SUCCESS */
.scard{background:var(--sf);border:2px solid var(--gn);border-radius:var(--ra);padding:24px;text-align:center;margin-top:16px}
.scard h3{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--gn);letter-spacing:1px;margin-bottom:14px}
.code-big{font-family:'Bebas Neue',sans-serif;font-size:52px;color:var(--ac);letter-spacing:8px;margin:6px 0}
.pw-big{font-size:22px;color:var(--tx);letter-spacing:4px;margin:4px 0}
.snote{font-size:12px;color:var(--mu);margin-top:12px;line-height:1.6}
/* FORMS */
.fg{margin-bottom:16px}
.fg label{display:block;font-size:12px;font-weight:600;color:var(--mu);margin-bottom:6px;letter-spacing:.8px;text-transform:uppercase}
.fh{text-transform:none;font-weight:300;font-size:11px}
.fi{width:100%;background:var(--sf);border:1px solid var(--bd);color:var(--tx);padding:11px 14px;border-radius:8px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s}
.fi:focus{border-color:var(--ac)}
.fi.sm{padding:8px 12px;font-size:13px}
.fsel{flex:1;min-width:110px;background:var(--sf);border:1px solid var(--bd);color:var(--tx);padding:10px;border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;outline:none}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:500px){.fr{grid-template-columns:1fr}}
.bg2{display:flex;gap:8px;flex-wrap:wrap}
.bo{padding:10px 14px;background:var(--sf);border:1px solid var(--bd);color:var(--mu);border-radius:8px;cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;transition:all .2s;white-space:nowrap}
.bo.on{background:var(--ac);color:#000;border-color:var(--ac);font-weight:600}
.pl{display:flex;flex-direction:column;gap:8px}
.pr{display:flex;align-items:center;gap:10px}
.pn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;background:var(--sf2);border-radius:50%;font-size:12px;color:var(--mu);flex-shrink:0}
.pc{font-size:11px;color:var(--mu);white-space:nowrap;flex-shrink:0}
/* POINTS BOX */
.pbox{background:var(--sf);border:1px solid var(--bd);border-radius:var(--ra);padding:14px;margin-bottom:18px}
.pbox h4{font-size:11px;color:var(--mu);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.pgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.pcell{background:var(--sf2);border-radius:8px;padding:10px;font-size:12px}
.ppos{font-weight:600;margin-bottom:5px;font-size:12px}
.prow{display:flex;justify-content:space-between;padding:2px 0}
.cw{color:var(--gn)}.cd{color:var(--ac)}.cl{color:var(--mu)}
/* TOURNAMENT CARDS */
.tlist{display:flex;flex-direction:column;gap:10px}
.tc{background:var(--sf);border:1px solid var(--bd);border-radius:var(--ra);display:flex;align-items:stretch;overflow:hidden;transition:border-color .2s}
.tc:hover{border-color:rgba(245,197,24,.35)}
.tcm{flex:1;padding:14px 18px;cursor:pointer}
.tcn{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;margin-bottom:4px}
.tccode{font-size:11px;color:var(--ac);font-family:'Bebas Neue',sans-serif;letter-spacing:2px}
.tcmeta{display:flex;gap:10px;font-size:12px;color:var(--mu);flex-wrap:wrap;margin-top:4px}
.tcs{padding:1px 10px;border-radius:20px;background:var(--sf2)}
.tcs.done{color:var(--gn);border:1px solid var(--gn)}.tcs.pend{color:var(--ac);border:1px solid var(--ac)}
.tcp{margin-top:5px;display:flex;gap:12px;font-size:11px;color:var(--mu)}
.tcd{background:none;border:none;border-left:1px solid var(--bd);padding:0 16px;color:var(--mu);cursor:pointer;font-size:18px;flex-shrink:0}
.tcd:hover{background:rgba(192,57,43,.1);color:var(--rd)}
/* TOURNAMENT HEADER CODE */
.tcode-badge{display:inline-flex;align-items:center;gap:6px;background:var(--sf2);border:1px solid var(--ac);border-radius:8px;padding:5px 12px;font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--ac);letter-spacing:3px;margin-bottom:12px}
.tcode-lbl{font-size:10px;color:var(--mu);font-family:'DM Sans',sans-serif;letter-spacing:.5px}
/* DRAFT */
.draft-topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.draft-logo-txt{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;opacity:.7}
.draft-logo-txt .k{color:#c0392b}
.db{background:var(--sf);border:1px solid var(--ac);border-radius:var(--ra);padding:16px 18px;margin-bottom:18px}
.dr{font-size:11px;color:var(--mu);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.dt{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.da{color:var(--ac);font-size:18px;animation:pulse 1s infinite}
.dn{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--ac);letter-spacing:1px}
.dl{color:var(--mu);font-size:12px}
.dbar{height:5px;background:var(--sf2);border-radius:3px;overflow:hidden;margin-bottom:4px}
.dfill{height:100%;background:linear-gradient(90deg,var(--ac),var(--ac2));transition:width .5s}
.dtxt{font-size:11px;color:var(--mu);text-align:right}
.timer-wrap{margin-top:8px}
.timer-top{display:flex;justify-content:space-between;margin-bottom:4px;font-size:11px;color:var(--mu)}
.timer-num{font-family:'Bebas Neue',sans-serif;font-size:17px}
.timer-bar{height:6px;background:var(--sf2);border-radius:3px;overflow:hidden}
.timer-fill{height:100%;border-radius:3px}
.ddone{background:var(--sf);border:1px solid var(--gn);border-radius:var(--ra);padding:14px;text-align:center;color:var(--gn);font-weight:500;margin-bottom:18px}
.dlayout{display:grid;grid-template-columns:1fr 285px;gap:14px}
@media(max-width:700px){.dlayout{grid-template-columns:1fr}}
.full{grid-column:1/-1}
.pf{margin-bottom:8px;display:flex;flex-direction:column;gap:6px}
.gtabs{display:flex;flex-wrap:wrap;gap:4px}
.gtab{padding:4px 8px;background:var(--sf);border:1px solid var(--bd);color:var(--mu);border-radius:6px;cursor:pointer;font-size:11px;font-family:'DM Sans',sans-serif}
.gtab.on{background:var(--ac);color:#000;border-color:var(--ac);font-weight:600}
.tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(142px,1fr));gap:5px;max-height:470px;overflow-y:auto;padding-right:2px}
.tbtn{display:flex;align-items:center;gap:7px;padding:7px 9px;background:var(--sf);border:1px solid var(--bd);border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;color:var(--tx);font-size:13px;text-align:left;width:100%;transition:all .15s}
.tbtn:hover{border-color:var(--ac);background:var(--sf2)}
.tf{font-size:16px;flex-shrink:0}.tn{flex:1;font-size:11px;line-height:1.3}
.tba{font-size:9px;padding:2px 4px;border-radius:4px;white-space:nowrap;background:var(--sf2)}
.acol{max-height:560px;overflow-y:auto}
.ct{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:1px;margin-bottom:10px;color:var(--mu)}
.acard{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:10px 12px;margin-bottom:7px}
.acard.cur{border-color:var(--ac);background:rgba(245,197,24,.04)}
.ahead{display:flex;justify-content:space-between;margin-bottom:5px}
.aname{font-weight:600;font-size:13px}.ack{font-size:11px;color:var(--mu)}
.ateams{display:flex;flex-direction:column;gap:2px}
.ateam{font-size:11px;color:var(--tx)}.aempty{font-size:11px;color:var(--mu);font-style:italic}
/* TOURNAMENT */
.thead2{margin-bottom:6px}
.tprizes{display:flex;gap:12px;font-size:13px;color:var(--mu);margin-bottom:12px;flex-wrap:wrap}
.tprizes strong{color:var(--ac)}
.tabs{display:flex;gap:4px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:8px 12px;background:var(--sf);border:1px solid var(--bd);color:var(--mu);border-radius:8px;cursor:pointer;font-size:12px;white-space:nowrap;font-family:'DM Sans',sans-serif;flex-shrink:0}
.tab.on{background:var(--ac);color:#000;border-color:var(--ac);font-weight:600}
.ro-note{background:rgba(245,197,24,.06);border:1px solid rgba(245,197,24,.2);border-radius:8px;padding:8px 14px;font-size:12px;color:var(--mu);margin-bottom:14px}
/* LEADERBOARD */
.lb{display:flex;flex-direction:column;gap:8px}
.lbr{display:flex;align-items:center;gap:14px;padding:13px 16px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--ra)}
.lbr.g{border-color:var(--go);background:rgba(255,215,0,.04)}
.lbr.s{border-color:var(--si)}.lbr.b{border-color:var(--br)}
.lbrk{font-size:20px;width:34px;text-align:center;flex-shrink:0}
.lbi{flex:1;display:flex;flex-direction:column;gap:3px;min-width:0}
.lbn{font-weight:600;font-size:15px}.lbf{font-size:15px;letter-spacing:1px}
.cbadge{font-size:11px;color:var(--ac);background:rgba(245,197,24,.12);padding:2px 8px;border-radius:4px;border:1px solid rgba(245,197,24,.3);width:fit-content}
.lbp{font-family:'Bebas Neue',sans-serif;font-size:34px;color:var(--ac);line-height:1;flex-shrink:0}
.lbp small{font-size:12px;color:var(--mu);font-family:'DM Sans',sans-serif;margin-left:2px}
/* EQUIPOS */
.mtl{display:flex;flex-direction:column;gap:10px}
.mtc{background:var(--sf);border:1px solid var(--bd);border-radius:var(--ra);overflow:hidden}
.mth{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;background:var(--sf2)}
.mtrk{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--mu);margin-right:5px}
.mtnm{font-weight:600;font-size:14px}.mttot{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--ac)}
.mttms{padding:8px 12px;display:flex;flex-direction:column;gap:4px}
.mttm{display:flex;align-items:center;gap:6px;font-size:12px;padding:5px 8px;border-radius:6px;background:var(--sf2)}
.mttm.ch{border:1px solid var(--ac);background:rgba(245,197,24,.07)}
.mtfl{font-size:15px;flex-shrink:0}.mttnm{flex:1;font-size:12px}
.mtg{color:var(--mu);font-size:10px;white-space:nowrap}
.mttp{color:var(--ac);font-weight:600;font-size:12px;white-space:nowrap}
/* GLOBAL TABLE */
.glt{display:flex;flex-direction:column;gap:10px}
.gld{font-size:13px;color:var(--mu)}
.gtw{overflow-x:auto;border-radius:var(--ra);border:1px solid var(--bd)}
.gtbl{width:100%;border-collapse:collapse;font-size:13px}
.gtbl thead tr{background:var(--sf2)}
.gtbl th{padding:9px 10px;text-align:left;font-size:10px;font-weight:600;color:var(--mu);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;border-bottom:1px solid var(--bd)}
.gtbl td{padding:8px 10px;border-bottom:1px solid var(--bd)}
.gtbl tr:last-child td{border-bottom:none}
.gtbl tr:hover td{background:rgba(255,255,255,.02)}
.gta td{color:var(--tx)}.gtch td{background:rgba(245,197,24,.05)}
.gtrk{font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--mu);text-align:center;width:28px}
.gtteam{display:flex;align-items:center;gap:6px;font-weight:500;white-space:nowrap;min-width:120px}
.gtfl{font-size:15px}.gtown{color:var(--mu);font-size:12px;white-space:nowrap}
.gtctr{text-align:center}.gtw2{color:var(--gn);text-align:center;font-weight:600}
.gtd2{color:var(--ac);text-align:center}
.gtpts{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--ac);text-align:right;white-space:nowrap}
.gtnote{font-size:11px;color:var(--mu)}
/* RESULTS */
.rlist{display:flex;flex-direction:column;gap:18px}
.rform{background:var(--sf);border:1px solid var(--bd);border-radius:var(--ra);padding:16px 18px}
.rform h3{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;margin-bottom:12px}
.rinps{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.sc{width:52px;text-align:center;background:var(--sf2);border:1px solid var(--bd);color:var(--tx);padding:9px 6px;border-radius:8px;font-size:20px;font-family:'Bebas Neue',sans-serif;outline:none;flex-shrink:0}
.vs{color:var(--mu);font-family:'Bebas Neue',sans-serif;font-size:22px;padding:0 2px;flex-shrink:0}
.rhist h3{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;margin-bottom:8px}
.rrow{display:flex;align-items:center;gap:7px;padding:9px 12px;background:var(--sf);border:1px solid var(--bd);border-radius:8px;margin-bottom:5px;font-size:12px}
.rt{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.rt.r{text-align:right}.rt.w{color:var(--gn);font-weight:600}
.rmid{display:flex;flex-direction:column;align-items:center;flex-shrink:0;min-width:56px}
.rsco{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--ac);line-height:1}
.rdw{font-size:9px;color:var(--mu);text-transform:uppercase}
.rdel{background:none;border:none;color:var(--mu);cursor:pointer;font-size:13px;padding:4px 6px;border-radius:4px;flex-shrink:0}
.rdel:hover{color:var(--rd);background:rgba(192,57,43,.1)}
/* CHAMPION */
.chh3{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:1px;margin-bottom:8px}
.chhint{color:var(--mu);font-size:13px;margin-bottom:14px}
.chcur{background:rgba(245,197,24,.08);border:1px solid var(--ac);border-radius:8px;padding:12px 16px;margin-bottom:14px;font-size:14px;line-height:1.6}
.chgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:7px}

function getSavedPw(){ try{ return localStorage.getItem(PW_KEY2)||"mundial2026"; }catch(x){ return "mundial2026"; } }
function switchTab(tab){
  document.getElementById("panel-admin").style.display = tab==="admin"?"block":"none";
  document.getElementById("panel-join").style.display  = tab==="join" ?"block":"none";
  document.getElementById("tab-admin").style.background = tab==="admin"?"#f5c518":"#161e30";
  document.getElementById("tab-admin").style.color      = tab==="admin"?"#000":"#5a6380";
  document.getElementById("tab-admin").style.border     = tab==="admin"?"none":"1px solid #1e2840";
  document.getElementById("tab-join").style.background  = tab==="join" ?"#f5c518":"#161e30";
  document.getElementById("tab-join").style.color       = tab==="join" ?"#000":"#5a6380";
  document.getElementById("tab-join").style.border      = tab==="join" ?"none":"1px solid #1e2840";
}
function tryAdmin(){
  var pw = document.getElementById("admin-pw").value;
  if(pw === getSavedPw()){
    LOGIN_ROLE = "admin";
    LOGIN_TID  = null;
    document.getElementById("login-overlay").style.display = "none";
    if(window.mountApp) window.mountApp();
  } else {
    var msg = document.getElementById("admin-msg");
    msg.textContent = "Contrasena incorrecta";
    setTimeout(function(){ msg.textContent=""; }, 2500);
  }
}
function tryJoin(){
  var code = document.getElementById("join-code").value.trim();
  var tpw  = document.getElementById("join-pw").value;
  var msg  = document.getElementById("join-msg");
  firebase.database().ref("tournaments").once("value",function(snap){
    var ts = snap.val()||{};
    var found = null;
    Object.keys(ts).forEach(function(k){ if(ts[k].code===code) found=k; });
    if(!found){ msg.textContent="Codigo no encontrado"; setTimeout(function(){msg.textContent="";},2500); return; }
    if(ts[found].password!==tpw){ msg.textContent="Contrasena incorrecta"; setTimeout(function(){msg.textContent="";},2500); return; }
    LOGIN_ROLE = "player";
    LOGIN_TID  = found;
    document.getElementById("login-overlay").style.display = "none";
    if(window.mountApp) window.mountApp();
  });
}

          return e("div",{key:i,className:"pr"},
            e("span",{className:"pn"},i+1),
            e("input",{className:"fi",value:n,onChange:function(x){var a=en.slice();a[i]=x.target.value;setEn(a);},placeholder:"Participante "+(i+1)}),
            e("span",{className:"pc"},(t.draftAssignments[i]||[]).length+" eq.")
          );
        }))
      ),
      e("button",{className:"btn sm",onClick:saveEdit},"Guardar nombres"),
      e("div",{className:"dz"},
        e("h4",null,"Zona de peligro"),
        e("p",null,"Eliminar borra todos los datos permanentemente."),
        e("button",{className:"btn dg",onClick:function(){if(window.confirm("Eliminar torneo?")){ fbSet("tournaments/"+tid,null); onHome(); notify("Eliminado"); }}},"Eliminar torneo")
      )
    )
  );
}

/* ---- APP ---- */
function App(){
  // Store role in state so re-renders don't lose it
  var roleS=useState(function(){ return window.LOGIN_ROLE||""; });
  var role=roleS[0];
  var isAdmin = (role === "admin");

  var initTid = window.LOGIN_TID || null;
  var tsS=useState({});var ts=tsS[0],setTs=tsS[1];
  var vS=useState(initTid?"tournament":"home");var v=vS[0],setV=vS[1];
  var aidS=useState(initTid);var aid=aidS[0],setAid=aidS[1];
  var nfS=useState(null);var nf=nfS[0],setNf=nfS[1];

  useEffect(function(){
    var ref = firebase.database().ref("tournaments");
    ref.on("value", function(snap){
      setTs(snap.val() || {});
    });
    return function(){ ref.off(); };
  },[]);

  var notify=useCallback(function(msg,type){
    setNf({msg:msg,type:type||"ok"});
    setTimeout(function(){setNf(null);},3000);
  },[]);

  function assignTeam(tid2,team,isAuto){
    var tr=ts[tid2]; var info=draftInfo(tr); if(!info) return;
    var prev=tr.draftAssignments[info.playerIdx]||[];
    var newDA=merge(tr.draftAssignments,{});
    newDA[info.playerIdx]=prev.concat([team]);
    fbSet("tournaments/"+tid2+"/draftAssignments",newDA);
    notify(isAuto?"Tiempo agotado - "+disp(team)+" asignado":disp(team)+" a "+info.playerName);
  }

  var t=aid?ts[aid]:null;



  return e("div",null,
    nf && e("div",{className:"notif"+(nf.type==="err"?" err":"")},nf.msg),
    v==="home" && e(Home,{ts:ts,isAdmin:isAdmin,notify:notify,
      onOpen:function(id,done){setAid(id);setV(done?"tournament":"draft");},
      onDel:function(id){if(window.confirm("Eliminar torneo?")){ fbSet("tournaments/"+id,null); notify("Eliminado"); }},
      onNew:function(){setV("create");},onRk:function(){setV("ranking");}}),
    v==="ranking" && e(Ranking,{onBack:function(){setV("home");}}),
    v==="create" && isAdmin && e(Create,{ts:ts,notify:notify,onBack:function(){setV("home");},
      onDone:function(foundId){
        if(foundId){ setAid(foundId); setV("draft"); } else { setV("home"); }
      }}),
    v==="draft" && t && e(Draft,{key:aid,t:t,tid:aid,isAdmin:isAdmin,onAssign:assignTeam,onHome:function(){setV("home");},onDone:function(){setV("tournament");}}),
    v==="tournament" && t && e(Tournament,{key:aid,t:t,tid:aid,onHome:function(){setV("home");},notify:notify,isAdmin:isAdmin})
  );
}

window.mountApp = function(){
  ReactDOM.createRoot(document.getElementById("root")).render(e(App));
};
</script>
</body>
</html>
